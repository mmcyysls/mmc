<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手机基站信息查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #999;
            font-size: 14px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        input {
            flex: 1;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        input::placeholder {
            color: #ccc;
        }
        
        button {
            padding: 14px 35px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .result-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            margin-top: 25px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        
        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }
        
        .result-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }
        
        .result-label {
            font-size: 12px;
            opacity: 0.8;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .result-value {
            font-size: 18px;
            font-weight: bold;
            word-break: break-all;
        }
        
        .result-full {
            grid-column: 1 / -1;
        }
        
        .base-station-info {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .base-station-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 12px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 8px;
        }
        
        .base-station-list {
            display: grid;
            gap: 10px;
        }
        
        .station-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid #FFD700;
        }
        
        .station-name {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .station-detail {
            font-size: 12px;
            opacity: 0.9;
            line-height: 1.6;
        }
        
        .coverage-map {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            text-align: center;
        }
        
        .coverage-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            overflow: hidden;
            margin-top: 8px;
        }
        
        .coverage-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            transition: width 0.3s;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            font-size: 16px;
            padding: 20px;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            color: #e74c3c;
            background: #fadbd8;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #e74c3c;
            font-size: 14px;
        }
        
        .examples {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .examples h3 {
            color: #333;
            font-size: 14px;
            margin-bottom: 12px;
        }
        
        .example-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 8px;
        }
        
        .example-btn {
            padding: 8px 12px;
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .example-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .info-box {
            background: #f0f7ff;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            font-size: 12px;
            color: #333;
            margin-top: 20px;
        }
        
        @media (max-width: 500px) {
            .container {
                padding: 25px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .result-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            
            .input-group {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📡 手机基站信息查询</h1>
            <p class="subtitle">查询手机号所在区域的基站分布和信号覆盖情况</p>
        </div>
        
        <div class="input-group">
            <input 
                type="text" 
                id="phoneInput" 
                placeholder="输入手机号码（11位数字）"
                maxlength="11"
            >
            <button onclick="queryPhone()">查询</button>
        </div>
        
        <div id="result"></div>
        
        <div class="examples">
            <h3>📋 快速示例：</h3>
            <div class="example-list">
                <button class="example-btn" onclick="queryWithNumber('13800138000')">北京基站</button>
                <button class="example-btn" onclick="queryWithNumber('15501550000')">上海基站</button>
                <button class="example-btn" onclick="queryWithNumber('17601760000')">深圳基站</button>
            </div>
        </div>
        
        <div class="info-box">
            💡 本工具根据手机号段估计基站位置和信号覆盖情况，显示该地区的主要基站分布信息
        </div>
    </div>

    <script>
        // 基站信息数据库
        const baseStationDatabase = {
            '北京': {
                region: '北京市',
                stations: [
                    { name: '朝阳基站群', coverage: 95, location: '朝阳区CBD', signal: '强' },
                    { name: '海淀基站群', coverage: 93, location: '海淀区中关村', signal: '强' },
                    { name: '西城基站群', coverage: 92, location: '西城区金融街', signal: '强' },
                    { name: '丰台基站群', coverage: 88, location: '丰台区南四环', signal: '中强' },
                    { name: '东城基站群', coverage: 90, location: '东城区天安门', signal: '强' }
                ],
                avgCoverage: 92,
                carriers: ['移动', '电信', '联通'],
                population: '2171万'
            },
            '上海': {
                region: '上海市',
                stations: [
                    { name: '浦东基站群', coverage: 94, location: '浦东新区陆家嘴', signal: '强' },
                    { name: '浦西基站群', coverage: 92, location: '黄浦区人民广场', signal: '强' },
                    { name: '虹口基站群', coverage: 91, location: '虹口区四川北路', signal: '强' },
                    { name: '长宁基站群', coverage: 89, location: '长宁区淮海路', signal: '中强' },
                    { name: '静安基站群', coverage: 90, location: '静安区南京路', signal: '强' }
                ],
                avgCoverage: 91,
                carriers: ['移动', '电信', '联通'],
                population: '2428万'
            },
            '深圳': {
                region: '深圳市',
                stations: [
                    { name: '罗湖基站群', coverage: 94, location: '罗湖区京基100', signal: '强' },
                    { name: '南山基站群', coverage: 93, location: '南山区科技园', signal: '强' },
                    { name: '福田基站群', coverage: 92, location: '福田区金融中心', signal: '强' },
                    { name: '宝安基站群', coverage: 89, location: '宝安区石岩', signal: '中强' },
                    { name: '龙华基站群', coverage: 88, location: '龙华区民治', signal: '中强' }
                ],
                avgCoverage: 91,
                carriers: ['移动', '电信', '联通'],
                population: '1344万'
            },
            '广州': {
                region: '广州市',
                stations: [
                    { name: '天河基站群', coverage: 93, location: '天河区珠江新城', signal: '强' },
                    { name: '越秀基站群', coverage: 91, location: '越秀区北京路', signal: '强' },
                    { name: '海珠基站群', coverage: 90, location: '海珠区琶洲', signal: '强' },
                    { name: '番禺基站群', coverage: 87, location: '番禺区东面', signal: '中强' },
                    { name: '白云基站群', coverage: 86, location: '白云区白云山', signal: '中' }
                ],
                avgCoverage: 89,
                carriers: ['移动', '电信', '联通'],
                population: '1505万'
            },
            '杭州': {
                region: '杭州市',
                stations: [
                    { name: '西湖基站群', coverage: 92, location: '西湖区丹枫路', signal: '强' },
                    { name: '滨江基站群', coverage: 91, location: '滨江区长河街', signal: '强' },
                    { name: '上城基站群', coverage: 90, location: '上城区武林广场', signal: '强' },
                    { name: '下城基站群', coverage: 89, location: '下城区延安路', signal: '中强' },
                    { name: '萧山基站群', coverage: 85, location: '萧山区北干道', signal: '中' }
                ],
                avgCoverage: 89,
                carriers: ['移动', '电信', '联通'],
                population: '1020万'
            },
            '成都': {
                region: '成都市',
                stations: [
                    { name: '锦江基站群', coverage: 91, location: '锦江区春熙路', signal: '强' },
                    { name: '武侯基站群', coverage: 90, location: '武侯区软件园', signal: '强' },
                    { name: '青羊基站群', coverage: 89, location: '青羊区宽窄巷子', signal: '中强' },
                    { name: '金牛基站群', coverage: 88, location: '金牛区府青路', signal: '中强' },
                    { name: '成华基站群', coverage: 87, location: '成华区东门大桥', signal: '中' }
                ],
                avgCoverage: 89,
                carriers: ['移动', '电信', '联通'],
                population: '1658万'
            }
        };
        
        // 号段与城市映射
        const prefixCityMap = {
            '130': '北京', '131': '北京', '132': '北京', '133': '北京', '134': '北京', '135': '北京',
            '136': '北京', '137': '北京', '138': '北京', '139': '北京', '140': '北京', '141': '北京',
            '147': '北京', '148': '北京', '149': '北京', '150': '北京', '151': '上海', '152': '深圳',
            '153': '上海', '154': '杭州', '155': '广州', '156': '深圳', '157': '北京', '158': '成都',
            '159': '杭州', '160': '广州', '162': '上海', '163': '深圳', '164': '成都', '165': '杭州',
            '166': '广州', '170': '北京', '171': '上海', '172': '深圳', '173': '成都', '174': '杭州',
            '175': '广州', '176': '北京', '177': '上海', '178': '深圳', '180': '成都', '181': '杭州',
            '182': '北京', '183': '广州', '184': '成都', '185': '上海', '186': '深圳', '187': '杭州',
            '188': '北京', '189': '广州', '190': '上海', '191': '深圳', '192': '成都', '193': '杭州',
            '194': '广州', '195': '北京', '196': '上海', '197': '深圳', '198': '成都', '199': '杭州'
        };
        
        // 手机号验证
        function isValidPhone(phone) {
            const phoneRegex = /^1[3-9]\d{9}$/;
            return phoneRegex.test(phone);
        }
        
        // 查询手机基站信息
        function queryPhone() {
            const phoneInput = document.getElementById('phoneInput').value.trim();
            const resultDiv = document.getElementById('result');
            
            // 验证输入
            if (!phoneInput) {
                resultDiv.innerHTML = '<div class="error">❌ 请输入手机号码</div>';
                return;
            }
            
            if (!isValidPhone(phoneInput)) {
                resultDiv.innerHTML = '<div class="error">❌ 请输入有效的手机号码（11位数字，以1开头）</div>';
                return;
            }
            
            resultDiv.innerHTML = '<div class="loading"><span class="spinner"></span>查询中...</div>';
            
            // 模拟网络延迟
            setTimeout(() => {
                const prefix = phoneInput.substring(0, 3);
                const city = prefixCityMap[prefix] || '全国';
                const stationData = baseStationDatabase[city];
                
                if (stationData) {
                    const stationHTML = stationData.stations.map(station => `
                        <div class="station-item">
                            <div class="station-name">📍 ${station.name}</div>
                            <div class="station-detail">
                                <div>📌 位置: ${station.location}</div>
                                <div>📶 信号强度: ${station.signal}</div>
                                <div>覆盖范围: ${station.coverage}%</div>
                            </div>
                        </div>
                    `).join('');
                    
                    const signalColor = stationData.avgCoverage >= 92 ? '#27ae60' : 
                                       stationData.avgCoverage >= 88 ? '#f39c12' : '#e74c3c';
                    
                    resultDiv.innerHTML = `
                        <div class="result-card">
                            <div style="font-size: 16px; margin-bottom: 15px;">✅ 基站信息查询成功</div>
                            <div class="result-grid">
                                <div class="result-item">
                                    <div class="result-label">手机号码</div>
                                    <div class="result-value">${phoneInput}</div>
                                </div>
                                <div class="result-item">
                                    <div class="result-label">所属城市</div>
                                    <div class="result-value">${stationData.region}</div>
                                </div>
                                <div class="result-item">
                                    <div class="result-label">号段</div>
                                    <div class="result-value">${prefix}</div>
                                </div>
                                <div class="result-item">
                                    <div class="result-label">人口规模</div>
                                    <div class="result-value">${stationData.population}</div>
                                </div>
                                <div class="result-item result-full">
                                    <div class="result-label">📡 运营商覆盖</div>
                                    <div class="result-value">${stationData.carriers.join(' | ')}</div>
                                </div>
                                <div class="result-item result-full">
                                    <div class="result-label">🎯 平均覆盖率</div>
                                    <div class="coverage-map">
                                        <div style="color: white; font-weight: bold;">${stationData.avgCoverage}%</div>
                                        <div class="coverage-bar">
                                            <div class="coverage-fill" style="width: ${stationData.avgCoverage}%; background: ${signalColor};"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="base-station-info">
                                <div class="base-station-title">🗼 该地区主要基站分布</div>
                                <div class="base-station-list">
                                    ${stationHTML}
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = '<div class="error">❌ 查询失败：该区域暂无基站数据</div>';
                }
            }, 800);
        }
        
        // 快速查询函数
        function queryWithNumber(phone) {
            document.getElementById('phoneInput').value = phone;
            queryPhone();
        }
        
        // 回车查询
        document.getElementById('phoneInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                queryPhone();
            }
        });
        
        // 自动格式化输入（只允许数字）
        document.getElementById('phoneInput').addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/[^\d]/g, '');
        });
    </script>
</body>
</html>
