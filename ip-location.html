<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP地址位置查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 24px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .result-group {
            display: grid;
            gap: 15px;
            margin-top: 20px;
        }
        
        .result-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        
        .result-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .result-value {
            font-size: 16px;
            color: #333;
            word-break: break-all;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            font-size: 14px;
        }
        
        .error {
            color: #e74c3c;
            background: #fadbd8;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            border-left: 4px solid #e74c3c;
        }
        
        .success {
            color: #27ae60;
            background: #d5f4e6;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            border-left: 4px solid #27ae60;
        }
        
        .auto-detect {
            text-align: center;
            margin-top: 20px;
        }
        
        .auto-detect button {
            background: #764ba2;
            font-size: 12px;
            padding: 8px 20px;
        }
        
        .auto-detect button:hover {
            background: #6a3d8a;
        }
        
        .map-link {
            text-align: center;
            margin-top: 15px;
        }
        
        .map-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        
        .map-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 IP地址位置查询</h1>
        
        <div class="input-group">
            <input type="text" id="ipInput" placeholder="输入IP地址或留空查询本机IP">
            <button onclick="queryIP()">查询</button>
        </div>
        
        <div id="result"></div>
        
        <div class="auto-detect">
            <button onclick="detectMyIP()">🔍 检测我的IP</button>
        </div>
    </div>

    <script>
        const ipRegex = /^(\d{1,3}\.){3}\d{1,3}$/;
        
        function isValidIP(ip) {
            if (!ipRegex.test(ip)) return false;
            const parts = ip.split('.');
            return parts.every(part => parseInt(part) <= 255);
        }
        
        function queryIP() {
            const ipInput = document.getElementById('ipInput').value.trim();
            const resultDiv = document.getElementById('result');
            
            if (ipInput && !isValidIP(ipInput)) {
                resultDiv.innerHTML = '<div class="error">❌ 请输入有效的IP地址 (例如: 8.8.8.8)</div>';
                return;
            }
            
            resultDiv.innerHTML = '<div class="loading">⏳ 查询中...</div>';
            
            // 使用 ipwhois.app 的免费API（无限制）
            const url = ipInput 
                ? `https://ipwhois.app/json/${ipInput}`
                : `https://ipwhois.app/json/`;
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.success === true) {
                        const mapUrl = `https://www.openstreetmap.org/?mlat=${data.latitude}&mlon=${data.longitude}&zoom=12`;
                        
                        resultDiv.innerHTML = `
                            <div class="success">✅ 查询成功</div>
                            <div class="result-group">
                                <div class="result-item">
                                    <div class="result-label">IP地址</div>
                                    <div class="result-value">${data.ip}</div>
                                </div>
                                <div class="result-item">
                                    <div class="result-label">国家</div>
                                    <div class="result-value">${data.country}</div>
                                </div>
                                <div class="result-item">
                                    <div class="result-label">地区</div>
                                    <div class="result-value">${data.region || '未知'}</div>
                                </div>
                                <div class="result-item">
                                    <div class="result-label">城市</div>
                                    <div class="result-value">${data.city}</div>
                                </div>
                                <div class="result-item">
                                    <div class="result-label">ISP运营商</div>
                                    <div class="result-value">${data.isp || '未知'}</div>
                                </div>
                                <div class="result-item">
                                    <div class="result-label">时区</div>
                                    <div class="result-value">${data.timezone || '未知'}</div>
                                </div>
                                <div class="result-item">
                                    <div class="result-label">坐标</div>
                                    <div class="result-value">纬度: ${data.latitude}, 经度: ${data.longitude}</div>
                                </div>
                                <div class="result-item">
                                    <div class="result-label">邮编</div>
                                    <div class="result-value">${data.postal || '未知'}</div>
                                </div>
                            </div>
                            <div class="map-link">
                                <a href="${mapUrl}" target="_blank">📍 在地图上查看位置</a>
                            </div>
                        `;
                    } else {
                        resultDiv.innerHTML = `<div class="error">❌ 查询失败：无法找到该IP信息</div>`;
                    }
                })
                .catch(error => {
                    resultDiv.innerHTML = `<div class="error">❌ 请求失败: ${error.message}</div>`;
                });
        }
        
        function detectMyIP() {
            document.getElementById('ipInput').value = '';
            queryIP();
        }
        
        document.getElementById('ipInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                queryIP();
            }
        });
    </script>
</body>
</html>
