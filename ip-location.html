<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP地址位置查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 24px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .result-group {
            display: grid;
            gap: 15px;
            margin-top: 20px;
        }
        
        .result-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        
        .result-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .result-value {
            font-size: 16px;
            color: #333;
            word-break: break-all;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            font-size: 14px;
        }
        
        .error {
            color: #e74c3c;
            background: #fadbd8;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            border-left: 4px solid #e74c3c;
        }
        
        .success {
            color: #27ae60;
            background: #d5f4e6;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            border-left: 4px solid #27ae60;
        }
        
        .auto-detect {
            text-align: center;
            margin-top: 20px;
        }
        
        .auto-detect button {
            background: #764ba2;
            font-size: 12px;
            padding: 8px 20px;
        }
        
        .auto-detect button:hover {
            background: #6a3d8a;
        }
        
        .map-link {
            text-align: center;
            margin-top: 15px;
        }
        
        .map-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        
        .map-link a:hover {
            text-decoration: underline;
        }
        
        .info {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 IP地址位置查询</h1>
        
        <div class="input-group">
            <input type="text" id="ipInput" placeholder="输入IP地址或留空查询本机IP">
            <button onclick="queryIP()">查询</button>
        </div>
        
        <div id="result"></div>
        
        <div class="auto-detect">
            <button onclick="detectMyIP()">🔍 检测我的IP</button>
        </div>
        
        <div class="info">
            提示：支持查询任意公网IP地址的地理位置信息
        </div>
    </div>

    <script>
        const ipRegex = /^(\d{1,3}\.){3}\d{1,3}$/;
        
        function isValidIP(ip) {
            if (!ipRegex.test(ip)) return false;
            const parts = ip.split('.');
            return parts.every(part => parseInt(part) <= 255);
        }
        
        // 获取本机IP的多种方法
        async function getMyIP() {
            try {
                // 方法1: 使用 ipify API
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (e) {
                try {
                    // 方法2: 使用 ip-api.com
                    const response = await fetch('https://ip-api.com/json/');
                    const data = await response.json();
                    return data.query;
                } catch (e2) {
                    return null;
                }
            }
        }
        
        // 查询IP位置的多API方案
        async function queryIPLocation(ip) {
            // 方法1: 使用 ip-api.com (需要CORS处理)
            try {
                const response = await fetch(`https://ip-api.com/json/${ip}?lang=zh-CN`);
                const data = await response.json();
                if (data.status === 'success') {
                    return {
                        success: true,
                        ip: data.query,
                        country: data.country,
                        region: data.regionName,
                        city: data.city,
                        isp: data.isp,
                        timezone: data.timezone,
                        latitude: data.lat,
                        longitude: data.lon,
                        source: 'ip-api.com'
                    };
                }
            } catch (e) {
                console.log('Method 1 failed, trying method 2...');
            }
            
            // 方法2: 使用 geoip-db.com API
            try {
                const response = await fetch(`https://geoip-db.com/json/${ip}`);
                const data = await response.json();
                if (data.country_code) {
                    return {
                        success: true,
                        ip: ip,
                        country: data.country_name,
                        region: data.state || data.region || '未知',
                        city: data.city,
                        isp: '未知',
                        timezone: data.timezone || '未知',
                        latitude: data.latitude,
                        longitude: data.longitude,
                        source: 'geoip-db.com'
                    };
                }
            } catch (e) {
                console.log('Method 2 failed, trying method 3...');
            }
            
            // 方法3: 使用 ipwho.is API
            try {
                const response = await fetch(`https://ipwho.is/${ip}?fields=country,region,city,timezone,latitude,longitude,isp`);
                const data = await response.json();
                if (data.success) {
                    return {
                        success: true,
                        ip: ip,
                        country: data.country,
                        region: data.region || '未知',
                        city: data.city,
                        isp: data.isp || '未知',
                        timezone: data.timezone || '未知',
                        latitude: data.latitude,
                        longitude: data.longitude,
                        source: 'ipwho.is'
                    };
                }
            } catch (e) {
                console.log('Method 3 failed, trying method 4...');
            }
            
            // 方法4: 使用 ipapi.co API
            try {
                const response = await fetch(`https://ipapi.co/${ip}/json/`);
                const data = await response.json();
                if (data.country_name) {
                    return {
                        success: true,
                        ip: ip,
                        country: data.country_name,
                        region: data.region || '未知',
                        city: data.city,
                        isp: data.org || '未知',
                        timezone: data.timezone || '未知',
                        latitude: data.latitude,
                        longitude: data.longitude,
                        source: 'ipapi.co'
                    };
                }
            } catch (e) {
                console.log('Method 4 failed');
            }
            
            return { success: false };
        }
        
        async function queryIP() {
            let ipInput = document.getElementById('ipInput').value.trim();
            const resultDiv = document.getElementById('result');
            
            // 如果没有输入IP，获取本机IP
            if (!ipInput) {
                resultDiv.innerHTML = '<div class="loading">⏳ 正在获取你的IP地址...</div>';
                ipInput = await getMyIP();
                if (!ipInput) {
                    resultDiv.innerHTML = '<div class="error">❌ 无法获取你的IP地址，请手动输入IP地址</div>';
                    return;
                }
            }
            
            // 验证输入
            if (!isValidIP(ipInput)) {
                resultDiv.innerHTML = '<div class="error">❌ 请输入有效的IP地址 (例如: 8.8.8.8)</div>';
                return;
            }
            
            resultDiv.innerHTML = '<div class="loading">⏳ 查询中...</div>';
            
            // 查询位置信息
            const result = await queryIPLocation(ipInput);
            
            if (result.success) {
                const mapUrl = `https://www.openstreetmap.org/?mlat=${result.latitude}&mlon=${result.longitude}&zoom=12`;
                
                resultDiv.innerHTML = `
                    <div class="success">✅ 查询成功 (数据来源: ${result.source})</div>
                    <div class="result-group">
                        <div class="result-item">
                            <div class="result-label">IP地址</div>
                            <div class="result-value">${result.ip}</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">国家</div>
                            <div class="result-value">${result.country}</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">地区</div>
                            <div class="result-value">${result.region}</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">城市</div>
                            <div class="result-value">${result.city}</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">ISP运营商</div>
                            <div class="result-value">${result.isp}</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">时区</div>
                            <div class="result-value">${result.timezone}</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">坐标</div>
                            <div class="result-value">纬度: ${result.latitude}, 经度: ${result.longitude}</div>
                        </div>
                    </div>
                    <div class="map-link">
                        <a href="${mapUrl}" target="_blank">📍 在地图上查看位置</a>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `<div class="error">❌ 查询失败：无法找到该IP的信息，请检查IP地址是否正确</div>`;
            }
        }
        
        function detectMyIP() {
            document.getElementById('ipInput').value = '';
            queryIP();
        }
        
        document.getElementById('ipInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                queryIP();
            }
        });
    </script>
</body>
</html>
